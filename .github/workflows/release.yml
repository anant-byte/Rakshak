name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build release
        working-directory: macos
        run: swift build -c release
      - uses: actions/upload-artifact@v4
        with:
          name: rakshak-macos-binaries
          path: |
            macos/.build/release/Rakshak
            macos/.build/release/RakshakDaemon

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Tauri build
        working-directory: windows
        run: |
          npm ci
          npm run tauri build
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: rakshak-windows-installer
          path: windows/src-tauri/target/release/bundle/
        continue-on-error: true
