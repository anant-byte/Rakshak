name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linux/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build -v ./...
      - run: go test ./...

  node-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linux/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: linux/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        continue-on-error: true

  swift-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build macOS package
        working-directory: macos
        run: swift build

  rust-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
        working-directory: core

  tauri-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build Tauri (no bundle)
        working-directory: windows
        run: |
          npm ci
          npm run build
        continue-on-error: true
